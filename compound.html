<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compounding Playground</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased pb-24">

  <main class="max-w-md mx-auto px-4 pt-6">
    
    <header class="text-center my-4">
      <p class="text-slate-400 text-xs font-semibold tracking-wider uppercase">Future Forecasting Playground</p>
      <h1 id="future-value-display" class="text-4xl font-black text-indigo-400 mt-1">$0.00</h1>
      <p id="current-starting-ref" class="text-slate-500 text-xs mt-1">Starting Principal: Loading...</p>
    </header>

    <section class="bg-slate-800/50 border border-slate-700/40 rounded-2xl p-5 mt-6 space-y-5">
      
      <div>
        <div class="flex justify-between text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">
          <span>Time Horizon</span>
          <span id="years-label" class="text-indigo-400 font-extrabold text-sm">10 Years</span>
        </div>
        <input type="range" id="years-slider" min="1" max="30" value="10" step="1" oninput="runProjections()" class="w-full accent-indigo-500 cursor-pointer h-2 bg-slate-900 rounded-lg appearance-none">
      </div>

      <div>
        <div class="flex justify-between text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">
          <span>Expected Return (Annual)</span>
          <span id="return-label" class="text-indigo-400 font-extrabold text-sm">8%</span>
        </div>
        <input type="range" id="return-slider" min="3" max="25" value="8" step="0.5" oninput="runProjections()" class="w-full accent-indigo-500 cursor-pointer h-2 bg-slate-900 rounded-lg appearance-none">
      </div>

    </section>

    <section class="mt-5 bg-slate-950/40 border border-slate-800 p-4 rounded-xl text-center">
      <p id="narrative-output" class="text-xs text-slate-400 leading-relaxed font-medium">
        Adjust the sliders above to look forward into your portfolio's compounding timeline.
      </p>
    </section>

  </main>

  <footer class="fixed bottom-0 left-0 right-0 bg-slate-950/95 backdrop-blur border-t border-slate-800 px-6 py-2.5 z-50">
    <div class="max-w-md mx-auto flex justify-around text-center">
      <a href="index.html" class="flex flex-col items-center text-slate-400 hover:text-indigo-400 transition-colors text-[11px]">
        <span class="text-lg">📊</span>
        <span>Dashboard</span>
      </a>
      <a href="freedom.html" class="flex flex-col items-center text-slate-400 hover:text-indigo-400 transition-colors text-[11px]">
        <span class="text-lg">🌴</span>
        <span>Freedom</span>
      </a>
      <a href="compound.html" class="flex flex-col items-center text-indigo-400 font-semibold text-[11px]">
        <span class="text-lg">⏳</span>
        <span>Compound</span>
      </a>
    </div>
  </footer>

  <script>
    // ⚠️ REPLACE THIS WITH YOUR GOOGLE APPS SCRIPT WEB APP URL
    const API_URL = "https://script.google.com/macros/s/AKfycbxXmofxW5JN2XHinuyldhRgiERUaLodlVrWc4NMoAmMjhapPhdOr6RHVaxoLo0GzPpG/exec";

    let basePrincipal = 0;

    const formatCurrency = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(val);

    async function initPlayground() {
      console.log("Fetching current asset base coordinates for forecasting engine...");
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        
        basePrincipal = data.totals.portfolioTotal;
        document.getElementById('current-starting-ref').innerText = `Starting Base: ${new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(basePrincipal)}`;
        
        runProjections();
      } catch (error) {
        console.error("Principal calculation failure:", error);
      }
    }

    function runProjections() {
      if (basePrincipal === 0) return;

      // Extract raw inputs directly from sliders
      const years = parseInt(document.getElementById('years-slider').value);
      const annualRate = parseFloat(document.getElementById('return-slider').value) / 100;

      // Update slider output strings
      document.getElementById('years-label').innerText = `${years} Years`;
      document.getElementById('return-label').innerText = `${(annualRate * 100).toFixed(1)}%`;

      // Standard annual compounding interest logic equation: FV = P * (1 + r)^t
      const futureValue = basePrincipal * Math.pow((1 + annualRate), years);
      const totalGrowthGenerated = futureValue - basePrincipal;

      // Update Main Numbers on UI View
      document.getElementById('future-value-display').innerText = formatCurrency(futureValue);

      // Generate dynamic textual long-term narrative breakdown
      document.getElementById('narrative-output').innerHTML = `
        Compounding your portfolio for <span class="text-slate-200 font-bold">${years} years</span> at an annual rate of 
        <span class="text-slate-200 font-bold">${(annualRate * 100).toFixed(1)}%</span> grows your net worth by 
        <span class="text-emerald-400 font-bold">${formatCurrency(totalGrowthGenerated)}</span> purely through compound returns. 
        No further capital additions or manual work required.
      `;
    }

    initPlayground();
  </script>
</body>
</html>
