<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wealth Dashboard Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased pb-12">

  <main class="max-w-md mx-auto px-4 pt-6">
    
    <div id="alert-banner" class="hidden mb-4 p-4 rounded-xl text-center font-bold text-sm shadow-lg transition-all duration-500"></div>

    <header class="text-center my-4 cursor-pointer" onclick="setCategoryFilter('all')" title="Reset to All">
      <p class="text-slate-400 text-xs font-semibold tracking-wider uppercase">Net Worth Portfolio</p>
      <h1 id="portfolio-total" class="text-4xl font-extrabold text-white mt-1 tracking-tight">$0.00</h1>
      <div id="trophy-room" class="flex justify-center gap-2 mt-2 text-xl min-h-[28px]"></div>
    </header>

    <section class="grid grid-cols-3 gap-2.5 mb-5">
      <div id="filter-spy" onclick="setCategoryFilter('spy')" class="bg-slate-800/60 border border-slate-700/50 p-3 rounded-xl text-center cursor-pointer transition-all hover:bg-slate-800">
        <span class="text-[10px] uppercase tracking-wider text-slate-400 block font-medium">SPY Core</span>
        <span id="spy-total" class="text-xs font-bold text-slate-200 block mt-1">$0.00</span>
      </div>
      <div id="filter-stocks" onclick="setCategoryFilter('stocks')" class="bg-slate-800/60 border border-slate-700/50 p-3 rounded-xl text-center cursor-pointer transition-all hover:bg-slate-800">
        <span class="text-[10px] uppercase tracking-wider text-slate-400 block font-medium">Stocks (Ex-SPY)</span>
        <span id="stocks-total" class="text-xs font-bold text-slate-200 block mt-1">$0.00</span>
      </div>
      <div id="filter-crypto" onclick="setCategoryFilter('crypto')" class="bg-slate-800/60 border border-slate-700/50 p-3 rounded-xl text-center cursor-pointer transition-all hover:bg-slate-800">
        <span class="text-[10px] uppercase tracking-wider text-slate-400 block font-medium">Crypto</span>
        <span id="crypto-total" class="text-xs font-bold text-slate-200 block mt-1">$0.00</span>
      </div>
    </section>

    <section class="bg-slate-800/40 border border-slate-700/30 rounded-2xl p-4 mb-6">
      <h3 id="chart-title" class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 text-center">Global Portfolio Breakdown</h3>
      <div class="relative w-full max-w-[240px] mx-auto aspect-square">
        <canvas id="allocationChart"></canvas>
      </div>
    </section>

    <section class="mb-4 bg-slate-950/40 p-2.5 rounded-xl border border-slate-800 flex justify-between items-center text-xs text-slate-400">
      <span id="list-status" class="font-semibold text-slate-300">All Assets</span>
      <div class="flex gap-2">
        <button id="sort-value-btn" onclick="toggleSort('value')" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-2.5 py-1.5 rounded font-medium transition-colors">
          Sort: Value ⇅
        </button>
        <button id="sort-change-btn" onclick="toggleSort('change')" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-2.5 py-1.5 rounded font-medium transition-colors">
          Sort: Today % ⇅
        </button>
      </div>
    </section>

    <section id="asset-list" class="space-y-2.5"></section>

    <footer class="left-0 right-0 bg-slate-950/95 backdrop-blur border-t border-slate-800 px-6 py-2.5 z-50">
        <div class="max-w-md mx-auto flex justify-around text-center">
          <a href="index.html" class="flex flex-col items-center text-indigo-400 font-semibold text-[11px]">
            <span class="text-lg">📊</span>
            <span>Dashboard</span>
          </a>
          <a href="freedom.html" class="flex flex-col items-center text-slate-400 hover:text-indigo-400 transition-colors text-[11px]">
            <span class="text-lg">🌴</span>
            <span>Freedom</span>
          </a>
          <a href="compound.html" class="flex flex-col items-center text-slate-400 hover:text-indigo-400 transition-colors text-[11px]">
            <span class="text-lg">⏳</span>
            <span>Compound</span>
          </a>
        </div>
      </footer>

  </main>

  <script>
    // Register the datalabels plugin to Chart.js globally
    Chart.register(ChartDataLabels);

    // ⚠️ PASTE YOUR COPIED WEB APP EXTENSION DEPLOYMENT URL HERE
    const API_URL = "https://script.google.com/macros/s/AKfycbxXmofxW5JN2XHinuyldhRgiERUaLodlVrWc4NMoAmMjhapPhdOr6RHVaxoLo0GzPpG/exec";

    // App state tracking engine
    let globalRawData = null;
    let currentCategoryFilter = 'all'; 
    let currentSortAttribute = 'value'; 
    let isAscending = false; 
    let allocationChartInstance = null;

    // List categories mapped out manually from your sheet asset structural rules
    const CRYPTO_TICKERS = ['BTC', 'DOGE', 'XMR', 'ETH', 'SOL', 'ADA', 'DOT', 'LINK', 'UNI'];

    const formatCurrency = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(val);

    async function initDashboard() {
      console.log("Initializing dashboard logic architecture...");
      await fetchDashboardData();
      setInterval(fetchDashboardData, 60000); 
    }

    async function fetchDashboardData() {
      try {
        const response = await fetch(API_URL);
        globalRawData = await response.json();
        console.log("Sheet packet fetched cleanly:", globalRawData);
        processAndRender();
      } catch (error) {
        console.error("Failed to parse financial data layer stream:", error);
        document.getElementById('asset-list').innerHTML = `
          <div class="bg-red-950/40 border border-red-800 text-red-200 p-4 rounded-xl text-center text-xs">
            Failed to parse API connection. Validate deployment parameters in Apps Script.
          </div>`;
      }
    }

    function processAndRender() {
      if (!globalRawData) return;

      const totals = globalRawData.totals;
      let assets = [...globalRawData.assets];

      const spyAsset = assets.find(a => a.ticker.toUpperCase() === 'SPY');
      const spyTotalVal = spyAsset ? spyAsset.totalValue : 0;

      assets = assets.map(asset => {
        let cat = 'stocks';
        if (asset.ticker.toUpperCase() === 'SPY') cat = 'spy';
        else if (CRYPTO_TICKERS.includes(asset.ticker.toUpperCase())) cat = 'crypto';
        return { ...asset, category: cat };
      });

      document.getElementById('portfolio-total').innerText = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(totals.portfolioTotal);
      document.getElementById('spy-total').innerText = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(spyTotalVal);
      document.getElementById('stocks-total').innerText = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(totals.stocksNoSpyTotal);
      document.getElementById('crypto-total').innerText = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(totals.cryptoTotal);

      evaluateMilestones(totals.portfolioTotal);

      let filteredAssets = assets;
      if (currentCategoryFilter !== 'all') {
        filteredAssets = assets.filter(a => a.category === currentCategoryFilter);
      }

      ['all', 'spy', 'stocks', 'crypto'].forEach(c => {
        const el = document.getElementById(c === 'all' ? 'portfolio-total' : `filter-${c}`);
        if (!el) return;
        if (currentCategoryFilter === c) {
          el.classList.add('ring-2', 'ring-indigo-500', 'bg-slate-800/90');
        } else {
          el.classList.remove('ring-2', 'ring-indigo-500', 'bg-slate-800/90');
        }
      });

      filteredAssets.sort((a, b) => {
        let valA = currentSortAttribute === 'value' ? a.totalValue : a.changeToday;
        let valB = currentSortAttribute === 'value' ? b.totalValue : b.changeToday;
        return isAscending ? valA - valB : valB - valA;
      });

      renderAssetCards(filteredAssets);
      updateChart(totals, assets, spyTotalVal);
    }

    function renderAssetCards(assetsList) {
      const container = document.getElementById('asset-list');
      const statusLabel = document.getElementById('list-status');
      container.innerHTML = '';

      statusLabel.innerText = `${currentCategoryFilter.toUpperCase()} view (${assetsList.length} items)`;

      if (assetsList.length === 0) {
        container.innerHTML = `<p class="text-center text-xs text-slate-500 py-6">No records matched active search parameter.</p>`;
        return;
      }

      assetsList.forEach(asset => {
        const isPositive = asset.changeToday >= 0;
        const changeClass = isPositive ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-rose-500/10 text-rose-400 border-rose-500/20';
        const changeSign = isPositive ? '+' : '';

        const card = document.createElement('div');
        card.className = "bg-slate-800/70 border border-slate-700/40 rounded-xl p-3.5 flex justify-between items-center transition-transform active:scale-[0.99]";
        card.innerHTML = `
          <div>
            <div class="flex items-center gap-2">
              <span class="font-black tracking-wide text-white text-base">${asset.ticker}</span>
              <span class="text-slate-400 text-xs">${asset.amount.toLocaleString(undefined, {maximumFractionDigits: 3})} units</span>
            </div>
            <div class="text-xs text-slate-400 mt-0.5">${new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(asset.price)}</div>
          </div>
          <div class="text-right">
            <div class="font-bold text-slate-100 text-base">${new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(asset.totalValue)}</div>
            <span class="inline-block text-[10px] font-extrabold px-2 py-0.5 rounded border ${changeClass} mt-0.5">
              ${changeSign}${asset.changeToday.toFixed(2)}%
            </span>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function updateChart(totals, allAssets, spyTotalVal) {
      const ctx = document.getElementById('allocationChart').getContext('2d');
      const chartTitle = document.getElementById('chart-title');
      
      let chartLabels = [];
      let chartData = [];
      let chartColors = ['#6366f1', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6', '#06b6d4', '#f43f5e', '#14b8a6', '#38bdf8', '#a7f3d0'];

      if (currentCategoryFilter === 'all') {
        chartTitle.innerText = "Global Portfolio Breakdown";
        chartLabels = ['SPY', 'Stocks', 'Crypto'];
        chartData = [spyTotalVal, totals.stocksNoSpyTotal, totals.cryptoTotal];
      } else {
        chartTitle.innerText = `${currentCategoryFilter.toUpperCase()} Individual Distribution`;
        const subset = allAssets.filter(a => a.category === currentCategoryFilter);
        subset.forEach(asset => {
          chartLabels.push(asset.ticker);
          chartData.push(asset.totalValue);
        });
      }

      if (allocationChartInstance) {
        allocationChartInstance.destroy();
      }

      allocationChartInstance = new Chart(ctx, {
        type: 'pie',
        data: {
          labels: chartLabels,
          datasets: [{
            data: chartData,
            backgroundColor: chartColors,
            borderWidth: 1.5,
            borderColor: '#1e293b'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }, // Keep legends off to save massive space on tiny phone screen layouts
            datalabels: {
              color: '#ffffff',
              font: {
                weight: 'bold',
                size: 10
              },
              textAlign: 'center',
              // Automatically hides the text label if the slice is too tiny to fit it
              display: function(context) {
                const dataset = context.dataset;
                const count = dataset.data.length;
                const value = dataset.data[context.dataIndex];
                const total = dataset.data.reduce((acc, val) => acc + val, 0);
                const percentage = (value / total) * 100;
                return percentage > 4; // Only draw labels on chunks taking up more than 4% of total space
              },
              formatter: function(value, context) {
                const label = context.chart.data.labels[context.dataIndex];
                const dataset = context.dataset;
                const total = dataset.data.reduce((acc, val) => acc + val, 0);
                const percentage = Math.round((value / total) * 100);
                
                // Formats slice output cleanly to: "30%\n$BTC"
                return `${percentage}%\n$${label}`;
              }
            }
          }
        }
      });
    }

    function setCategoryFilter(category) {
      console.log(`Shifting viewing filtering profile context to: ${category}`);
      currentCategoryFilter = category;
      processAndRender();
    }

    function toggleSort(attribute) {
      if (currentSortAttribute === attribute) {
        isAscending = !isAscending; 
      } else {
        currentSortAttribute = attribute;
        isAscending = false; 
      }
      console.log(`Sorting rule adjusted parameter: field=${attribute}, ascending=${isAscending}`);
      processAndRender();
    }

    function evaluateMilestones(currentTotal) {
      const previousPeak = parseFloat(localStorage.getItem('portfolio_historical_peak')) || 0;
      const thresholds = [
        { level: 100000, label: "100k Club 🥉" },
        { level: 500000, label: "Halfway to Mil 🥈" },
        { level: 1000000, label: "7-Digit Club 🐋" }
      ];

      const banner = document.getElementById('alert-banner');
      const trophyRoom = document.getElementById('trophy-room');
      trophyRoom.innerHTML = ''; 

      thresholds.forEach(t => {
        if (currentTotal >= t.level) {
          const badge = document.createElement('span');
          badge.className = "text-xs bg-slate-800 border border-slate-700 px-2.5 py-1 rounded-full font-semibold text-slate-300 shadow-sm";
          badge.innerText = t.label;
          trophyRoom.appendChild(badge);
        }
      });

      for (let i = thresholds.length - 1; i >= 0; i--) {
        const t = thresholds[i];
        if (currentTotal >= t.level && previousPeak < t.level && previousPeak !== 0) {
          triggerCelebration(t.label);
          break;
        }
      }

      let showingBearDip = false;
      thresholds.forEach(t => {
        if (previousPeak >= t.level && currentTotal < t.level) {
          banner.className = "block mb-4 p-4 rounded-xl text-center font-bold text-sm bg-rose-500/10 border border-rose-500/30 text-rose-400 shadow-md";
          banner.innerHTML = `🐻 Bear Alert: Slipped below the ${t.label.split(' ')[0]} mark. Frown down, but keep stacking units! ☹️`;
          showingBearDip = true;
        }
      });

      if (!showingBearDip && !banner.classList.contains('animate-bounce')) {
        banner.className = "hidden";
      }

      if (currentTotal > previousPeak) {
        localStorage.setItem('portfolio_historical_peak', currentTotal.toString());
      }
    }

    function triggerCelebration(milestoneLabel) {
      const banner = document.getElementById('alert-banner');
      banner.className = "block mb-4 p-4 rounded-xl text-center font-bold text-sm bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 animate-bounce shadow-md";
      banner.innerText = `🏆 Milestone Achieved: Welcome to the ${milestoneLabel}!`;

      confetti({ particleCount: 180, spread: 80, origin: { y: 0.6 } });
    }

    initDashboard();
  </script>
</body>
</html>
