<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wealth Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased pb-12">

  <main class="max-w-md mx-auto px-4 pt-6">
    
    <div id="alert-banner" class="hidden mb-4 p-4 rounded-xl text-center font-bold text-sm shadow-lg transition-all duration-500 transform scale-95"></div>

    <header class="text-center my-6">
      <p class="text-slate-400 text-xs font-semibold tracking-wider uppercase">Net Worth Portfolio</p>
      <h1 id="portfolio-total" class="text-4xl font-extrabold text-white mt-1 tracking-tight">$0.00</h1>
      <div id="trophy-room" class="flex justify-center gap-2 mt-2 text-xl"></div>
    </header>

    <section class="grid grid-cols-3 gap-3 mb-6">
      <div class="bg-slate-800/60 border border-slate-700/50 p-3 rounded-xl text-center">
        <span class="text-[10px] uppercase tracking-wider text-slate-400 block font-medium">SPY Core</span>
        <span id="spy-total" class="text-xs font-bold text-slate-200 block mt-1">$0.00</span>
      </div>
      <div class="bg-slate-800/60 border border-slate-700/50 p-3 rounded-xl text-center">
        <span class="text-[10px] uppercase tracking-wider text-slate-400 block font-medium">Stocks (Ex-SPY)</span>
        <span id="stocks-total" class="text-xs font-bold text-slate-200 block mt-1">$0.00</span>
      </div>
      <div class="bg-slate-800/60 border border-slate-700/50 p-3 rounded-xl text-center">
        <span class="text-[10px] uppercase tracking-wider text-slate-400 block font-medium">Crypto</span>
        <span id="crypto-total" class="text-xs font-bold text-slate-200 block mt-1">$0.00</span>
      </div>
    </section>

    <div class="flex justify-between items-center mb-3">
      <h2 class="text-sm font-bold text-slate-400 tracking-wide uppercase">Holdings Allocation</h2>
      <span id="asset-count" class="text-xs text-slate-500">0 Assets</span>
    </div>

    <section id="asset-list" class="space-y-2.5">
      <div class="bg-slate-800 animate-pulse h-16 rounded-xl border border-slate-700/30"></div>
      <div class="bg-slate-800 animate-pulse h-16 rounded-xl border border-slate-700/30"></div>
      <div class="bg-slate-800 animate-pulse h-16 rounded-xl border border-slate-700/30"></div>
    </section>

  </main>

  <script>
    // ⚠️ REPLACE THIS STRING WITH YOUR GOOGLE APPS SCRIPT WEB APP URL
    const API_URL = "https://script.google.com/macros/s/AKfycbxXmofxW5JN2XHinuyldhRgiERUaLodlVrWc4NMoAmMjhapPhdOr6RHVaxoLo0GzPpG/exec";

    // Format utility for standard currency outputs
    const formatCurrency = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val);

    async function fetchDashboardData() {
      console.log("Fetching live ledger data from Google Sheets API...");
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        
        console.log("Data successfully payloaded:", data);
        renderDashboard(data);
      } catch (error) {
        console.error("Critical failure pulling sheet architecture:", error);
        document.getElementById('asset-list').innerHTML = `
          <div class="bg-red-950/40 border border-red-800 text-red-200 p-4 rounded-xl text-center text-xs">
            Failed to feed data from Google Sheets API. Ensure your script deployment permissions are set to 'Anyone'.
          </div>`;
      }
    }

    function renderDashboard(data) {
      const totals = data.totals;
      const assets = data.assets;

      // Extract SPY value straight from asset array to show up in our sub-total bar
      const spyAsset = assets.find(a => a.ticker.toUpperCase() === 'SPY');
      const spyTotalVal = spyAsset ? spyAsset.totalValue : 0;

      // Update Top Tier Figures
      document.getElementById('portfolio-total').innerText = formatCurrency(totals.portfolioTotal);
      document.getElementById('spy-total').innerText = formatCurrency(spyTotalVal);
      document.getElementById('stocks-total').innerText = formatCurrency(totals.stocksNoSpyTotal);
      document.getElementById('crypto-total').innerText = formatCurrency(totals.cryptoTotal);
      document.getElementById('asset-count').innerText = `${assets.length} Assets`;

      // Handle calculations for Milestones
      evaluateMilestones(totals.portfolioTotal);

      // Render Individual Mobile Asset Cards
      const container = document.getElementById('asset-list');
      container.innerHTML = ''; // Wipe loading elements

      assets.forEach(asset => {
        const isPositive = asset.changeToday >= 0;
        const changeClass = isPositive ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-rose-500/10 text-rose-400 border-rose-500/20';
        const changeSign = isPositive ? '+' : '';

        const card = document.createElement('div');
        card.className = "bg-slate-800/80 border border-slate-700/40 rounded-xl p-3.5 flex justify-between items-center active:scale-[0.99] transition-transform duration-100";
        card.innerHTML = `
          <div>
            <div class="flex items-center gap-2">
              <span class="font-black tracking-wide text-white text-base">${asset.ticker}</span>
              <span class="text-slate-400 text-xs">${asset.amount.toLocaleString(undefined, {maximumFractionDigits: 4})} units</span>
            </div>
            <div class="text-xs text-slate-400 mt-0.5">${formatCurrency(asset.price)}</div>
          </div>
          <div class="text-right">
            <div class="font-bold text-slate-100 text-base">${formatCurrency(asset.totalValue)}</div>
            <span class="inline-block text-[10px] font-extrabold px-2 py-0.5 rounded border ${changeClass} mt-0.5">
              ${changeSign}${asset.changeToday.toFixed(2)}%
            </span>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function evaluateMilestones(currentTotal) {
      // Pull historical peak stats or baseline at 0 if first initialization
      const previousPeak = parseFloat(localStorage.getItem('portfolio_historical_peak')) || 0;
      console.log(`Peak Tracker -> Current: $${currentTotal} | Historical Peak: $${previousPeak}`);

      // Milestone Threshold Matrices
      const thresholds = [
        { level: 100000, label: "100k Club 🥉" },
        { level: 500000, label: "Halfway to Mil 🥈" },
        { level: 1000000, label: "7-Digit Club 🐋" }
      ];

      const banner = document.getElementById('alert-banner');
      const trophyRoom = document.getElementById('trophy-room');
      trophyRoom.innerHTML = ''; // Reset trophy view container

      // Append unlocked milestones as permanent visual display badges under total
      thresholds.forEach(t => {
        if (currentTotal >= t.level) {
          const badge = document.createElement('span');
          badge.className = "text-xs bg-slate-800 border border-slate-700 px-2.5 py-1 rounded-full shadow-inner font-semibold text-slate-300";
          badge.innerText = t.label;
          trophyRoom.appendChild(badge);
        }
      });

      // --- POSITIVE MILESTONE LOGIC ---
      // Loop backwards to check the largest milestone crossed first
      for (let i = thresholds.length - 1; i >= 0; i--) {
        const t = thresholds[i];
        
        // If current total passed a milestone, and the previous peak was below that milestone
        if (currentTotal >= t.level && previousPeak < t.level && previousPeak !== 0) {
          triggerCelebration(t.label);
          break; // Stop execution after firing top milestone celebration
        }
      }

      // --- NEGATIVE MILESTONE LOGIC (DIP ALERTER) ---
      thresholds.forEach(t => {
        // If your historical peak was over a milestone, but market volatility dropped you below it now
        if (previousPeak >= t.level && currentTotal < t.level) {
          banner.className = "block mb-4 p-4 rounded-xl text-center font-bold text-sm shadow-lg bg-amber-500/10 border border-amber-500/30 text-amber-400";
          banner.innerText = `📉 Market Discount Alert: Slipped back below the ${t.label.split(' ')[0]} milestone. Time to accumulation DCA!`;
        }
      });

      // Update local storage to lock in the absolute highest peak your assets ever reached
      if (currentTotal > previousPeak) {
        localStorage.setItem('portfolio_historical_peak', currentTotal.toString());
        console.log(`New portfolio high recorded in localStorage: $${currentTotal}`);
      }
    }

    function triggerCelebration(milestoneLabel) {
      console.log(`🎉 Executing particle fireworks engine for: ${milestoneLabel}`);
      
      const banner = document.getElementById('alert-banner');
      banner.className = "block mb-4 p-4 rounded-xl text-center font-bold text-sm shadow-lg bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 animate-bounce";
      banner.innerText = `🏆 Holy Cow! Milestone Achieved: Welcome to the ${milestoneLabel}!`;

      // Canvas Confetti execution parameters
      confetti({
        particleCount: 180,
        spread: 80,
        origin: { y: 0.6 } // Perfectly calibrated for thumb height on smartphones
      });
    }

    // Initialize application runtime loop
    initDashboard();
    
    function initDashboard() {
      fetchDashboardData();
      // Poll fresh Google Sheet API updates automatically every 60 seconds
      setInterval(fetchDashboardData, 60000);
    }
  </script>
</body>
</html>
